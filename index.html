        * {
            margin: 0;

            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Impede scroll por causa dos símbolos a voar */
            position: relative;
        }

        /* FUNDO COM SÍMBOLOS A VOAR */
        .background-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

            position: absolute;
            font-size: 40px;

        }
