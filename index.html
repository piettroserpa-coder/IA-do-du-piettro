<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Nike | Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="area-animada">
        <span class="logo-voando">NIKE</span>
        <span class="logo-voando">NIKE</span>
        <span class="logo-voando">NIKE</span>
        <span class="logo-voando">NIKE</span>
        <span class="logo-voando">NIKE</span>
        <span class="logo-voando">NIKE</span>
    </div>

    <div class="container">
        <form id="form-nike" onsubmit="finalizarCadastro(event)">
            <div class="topo-form">
                <div class="nike-main">NIKE</div>
            </div>
            
            <h2>Faça seu Cadastro</h2>
            <p>Junte-se a nós e acesse a loja oficial.</p>

            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Como quer ser chamado?" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>

            <button type="submit" class="btn-nike">Salvar e Comprar</button>
        </form>
    </div>

    <script>
        function finalizarCadastro(event) {
            event.preventDefault(); // Para o envio padrão
            
            alert('Cadastro realizado! Redirecionando para a Nike Brasil...');
            
            // Redirecionamento direto para a Nike
            window.location.href = "https://://www.nike.com.br";
        }
    </script>
</body>
</html>
