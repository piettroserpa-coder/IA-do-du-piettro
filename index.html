<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Nike Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="form-nike" onsubmit="redirecionarNike(event)">
            <div class="logo">NIKE</div>
            <h2>Criar Conta</h2>
            <p>Cadastre-se para acessar a loja oficial da Nike.</p>

            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="nome@exemplo.com" required>
            </div>

            <button type="submit" class="btn-nike">Salvar e Acessar Nike</button>
        </form>
    </div>

    <script>
        function redirecionarNike(event) {
            // Interrompe o envio padrão do formulário
            event.preventDefault();

            // Mensagem de confirmação
            alert('Cadastro feito com sucesso! Você será levado ao site da Nike.');

            // Redirecionamento forçado para o domínio da Nike
            window.location.href = "https://www.nike.com.br";
        }
    </script>
</body>
</html>
