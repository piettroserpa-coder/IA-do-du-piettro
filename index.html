<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Adidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="form-cadastro" onsubmit="enviarDados(event)">
            <h2>Novo Cadastro</h2>
            <p>Complete para acessar a loja oficial.</p>

            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu nome" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="email@exemplo.com" required>
            </div>

            <button type="submit" class="btn-salvar">Salvar e Abrir Loja</button>
        </form>
    </div>

    <script>
        function enviarDados(event) {
            // 1. Interrompe qualquer carregamento automático da página
            event.preventDefault();

            // 2. Mensagem de confirmação
            alert('Cadastro feito com sucesso!');

            // 3. Redirecionamento forçado para a vitrine da loja
            // Tentei usar o link direto da vitrine principal
            window.location.replace("https://www.adidas.com.br/homem");
        }
    </script>
</body>
</html>
