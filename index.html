<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="form-cadastro">
            <h2>Cadastro de Cliente</h2>
            <p>Preencha os campos para ser redirecionado.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" name="nascimento">
                </div>
            </div>

            <div class="input-group">
                <label for="obs">Observações</label>
                <textarea id="obs" name="obs" rows="3" placeholder="Alguma nota importante?"></textarea>
            </div>

            <button type="submit" class="btn-salvar">Salvar Cadastro</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
